<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Inventario Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:#0D1B2A; --navy2:#1A2E45; --cyan:#00C2FF; --bg:#EEF2F7;
    --surface:#FFFFFF; --border:#D1DCE8; --text:#1A2E45; --muted:#6B7E94;
    --green:#16A34A; --green-bg:#DCFCE7; --yellow:#B45309; --yellow-bg:#FEF9C3;
    --blue:#0369A1; --blue-bg:#E0F2FE; --red:#B91C1C; --red-bg:#FEE2E2;
    --radius:10px; --shadow:0 2px 12px rgba(13,27,42,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-brand span.badge{background:var(--cyan);color:var(--navy);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px;}
  .topbar-brand h1{font-size:15px;font-weight:700;letter-spacing:.3px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .topbar-date{font-size:11px;color:#8BA4BF;}
  .sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:#8BA4BF;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite;}
  .sync-dot.syncing{background:var(--cyan);animation:spin-dot 1s linear infinite;}
  .sync-dot.error{background:#F87171;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes spin-dot{0%{transform:scale(1);}50%{transform:scale(1.5);}100%{transform:scale(1);}}
  .btn-export{background:var(--cyan);color:var(--navy);border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
  .btn-export:hover{background:#33CCFF;}
  .btn-reload{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-reload:hover{background:rgba(255,255,255,.2);}

  .layout{display:flex;height:calc(100vh - 56px);overflow:hidden;}

  .sidebar{width:220px;min-width:220px;background:var(--navy2);overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:2px;}
  .sidebar-label{font-size:9px;font-weight:700;letter-spacing:1.2px;color:#4A6280;padding:10px 16px 4px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#8BA4BF;border-left:3px solid transparent;transition:all .15s;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.active{background:rgba(0,194,255,.1);color:var(--cyan);border-left-color:var(--cyan);}
  .nav-item .icon{font-size:16px;width:20px;text-align:center;}
  .nav-badge{margin-left:auto;background:rgba(0,194,255,.2);color:var(--cyan);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
  .nav-badge.pending{background:rgba(234,179,8,.15);color:#EAB308;}

  .main{flex:1;overflow-y:auto;padding:24px;}

  /* Loading overlay */
  .loading-overlay{position:fixed;inset:0;background:rgba(13,27,42,.7);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading-overlay.hidden{display:none;}
  .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:#fff;font-size:14px;font-weight:600;}

  .page-header{margin-bottom:20px;}
  .page-header h2{font-size:20px;font-weight:800;color:var(--navy);}
  .page-header p{font-size:13px;color:var(--muted);margin-top:2px;}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
  .kpi-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border-top:3px solid var(--border);display:flex;flex-direction:column;gap:4px;}
  .kpi-card.total{border-top-color:var(--cyan);}
  .kpi-card.green{border-top-color:var(--green);}
  .kpi-card.yellow{border-top-color:#EAB308;}
  .kpi-card.blue{border-top-color:#0EA5E9;}
  .kpi-card.red{border-top-color:var(--red);}
  .kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .kpi-value{font-size:28px;font-weight:800;color:var(--navy);line-height:1;}
  .kpi-card.green .kpi-value{color:var(--green);}
  .kpi-card.yellow .kpi-value{color:#D97706;}
  .kpi-card.blue .kpi-value{color:#0369A1;}
  .kpi-card.red .kpi-value{color:var(--red);}
  .kpi-sub{font-size:11px;color:var(--muted);}

  .progress-wrap{background:var(--surface);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;box-shadow:var(--shadow);}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .progress-title{font-size:13px;font-weight:600;}
  .progress-pct{font-size:18px;font-weight:800;color:var(--green);}
  .progress-track{height:10px;background:var(--bg);border-radius:10px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:10px;transition:width .5s ease;}

  .dash-table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .dash-table{width:100%;border-collapse:collapse;}
  .dash-table th{background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:10px 14px;text-align:left;letter-spacing:.4px;}
  .dash-table td{font-size:12px;padding:10px 14px;border-bottom:1px solid var(--bg);vertical-align:middle;}
  .dash-table tr:last-child td{border-bottom:none;}
  .dash-table tr:hover td{background:#F5F9FF;}
  .cat-name{font-weight:600;display:flex;align-items:center;gap:8px;}
  .mini-bar{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;width:80px;display:inline-block;}
  .mini-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:6px;}
  .pct-label{font-size:11px;font-weight:700;color:var(--green);margin-left:6px;}

  .badge-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px;white-space:nowrap;}
  .s-ENTREGADO{background:var(--green-bg);color:var(--green);}
  .s-PENDIENTE{background:var(--yellow-bg);color:var(--yellow);}
  .s-EN-PROCESO{background:var(--blue-bg);color:var(--blue);}
  .s-BAJA-FALLA{background:var(--red-bg);color:var(--red);}

  .table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .search-box:focus{border-color:var(--cyan);}
  .filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;background:#fff;cursor:pointer;outline:none;}
  .btn-add{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s;}
  .btn-add:hover{background:var(--navy2);}

  .res-table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .res-table{width:100%;border-collapse:collapse;}
  .res-table th{background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:10px 12px;text-align:left;letter-spacing:.5px;white-space:nowrap;}
  .res-table td{font-size:12px;padding:9px 12px;border-bottom:1px solid var(--bg);vertical-align:middle;}
  .res-table tr:last-child td{border-bottom:none;}
  .res-table tr:hover td{background:#F5F9FF;}

  .status-select-inline{border:1px solid var(--border);background:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;padding:4px 8px;border-radius:6px;outline:none;}
  .btn-del{background:none;border:none;color:#CBD5E1;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color .15s;}
  .btn-del:hover{color:var(--red);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h3{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--navy);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group.full{grid-column:1/-1;}
  .form-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .form-group input,.form-group select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group select:focus{border-color:var(--cyan);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .btn-cancel{background:var(--bg);color:var(--text);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-save{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;}
  .btn-save:hover{background:var(--cyan);color:var(--navy);}
  .btn-save:disabled{opacity:.5;cursor:not-allowed;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:300;opacity:0;transform:translateY(10px);transition:all .3s ease;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.success{background:#16A34A;}
  .toast.error{background:#B91C1C;}

  .empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty-state .icon{font-size:40px;margin-bottom:12px;}

  .error-banner{background:var(--red-bg);color:var(--red);border:1px solid #FECACA;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;font-weight:500;display:none;}
  .error-banner.show{display:block;}

  @media print{.topbar,.sidebar,.table-toolbar,.btn-del,.btn-add,.modal-overlay,.loading-overlay{display:none !important;}.layout{display:block;}.main{padding:10px;overflow:visible;}}
  @media(max-width:700px){.sidebar{width:56px;min-width:56px;}.nav-item span:not(.icon),.nav-badge,.sidebar-label{display:none;}.main{padding:14px;}.kpi-grid{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}.topbar-brand h1{font-size:13px;}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Conectando con Google Sheets…</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <span class="badge">OPS</span>
    <h1>Control de Inventario Operacional</h1>
  </div>
  <div class="topbar-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Conectado</span>
    </div>
    <span class="topbar-date" id="topDate"></span>
    <button class="btn-reload" onclick="loadAllData(true)">↺ Actualizar</button>
    <button class="btn-export" onclick="window.print()">🖨️ Imprimir</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Vistas</div>
    <div class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard"><span class="icon">📊</span> Dashboard</div>
    <div class="sidebar-label">Recursos</div>
    <div class="nav-item" onclick="navigate('motos')" data-page="motos"><span class="icon">🏍️</span> Motos <span class="nav-badge" id="nb-motos">–</span></div>
    <div class="nav-item" onclick="navigate('patrullas')" data-page="patrullas"><span class="icon">🚓</span> Patrullas <span class="nav-badge" id="nb-patrullas">–</span></div>
    <div class="nav-item" onclick="navigate('gps')" data-page="gps"><span class="icon">📡</span> GPS <span class="nav-badge" id="nb-gps">–</span></div>
    <div class="nav-item" onclick="navigate('equipos')" data-page="equipos"><span class="icon">💻</span> Equipos <span class="nav-badge" id="nb-equipos">–</span></div>
    <div class="nav-item" onclick="navigate('comunicacion')" data-page="comunicacion"><span class="icon">📻</span> Comunicación <span class="nav-badge" id="nb-comunicacion">–</span></div>
    <div class="nav-item" onclick="navigate('reasignacion')" data-page="reasignacion"><span class="icon">👮</span> Reasignación <span class="nav-badge" id="nb-reasignacion">–</span></div>
  </nav>

  <main class="main" id="mainContent">
    <div class="empty-state"><div class="icon">⏳</div><p>Cargando datos desde Google Sheets…</p></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbx3R5dioJ8ZgCHz6PxFEO1fP1nUtQWhMHkxLfKqfHAfykRAUf9ITHdGohwyks8L7ATDBA/exec";

const SECTIONS = {
  motos:       {label:"Unidades Motos",           icon:"🏍️", fields:[
    {key:"id",         label:"N° / Placa",          required:true},
    {key:"modelo",     label:"Marca / Modelo",       required:true},
    {key:"anio",       label:"Año"},
    {key:"unidad",     label:"Unidad Asignada"},
    {key:"responsable",label:"Responsable"},
    {key:"fecha",      label:"Fecha Asignación",     type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
  patrullas:   {label:"Unidades Patrullas",       icon:"🚓", fields:[
    {key:"id",         label:"N° / Placa",          required:true},
    {key:"modelo",     label:"Marca / Modelo",       required:true},
    {key:"anio",       label:"Año"},
    {key:"sector",     label:"Unidad / Sector"},
    {key:"conductor",  label:"Conductor Principal"},
    {key:"fecha",      label:"Fecha Asignación",     type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
  gps:         {label:"GPS",                      icon:"📡", fields:[
    {key:"id",         label:"ID Dispositivo",       required:true},
    {key:"modelo",     label:"Modelo GPS",           required:true},
    {key:"recurso",    label:"Recurso Asignado"},
    {key:"placa",      label:"Placa / N° Unidad"},
    {key:"tecnico",    label:"Técnico Responsable"},
    {key:"fecha",      label:"Fecha Instalación",    type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
  equipos:     {label:"Equipos",                  icon:"💻", fields:[
    {key:"id",         label:"ID Equipo",            required:true},
    {key:"tipo",       label:"Tipo de Equipo",       required:true},
    {key:"modelo",     label:"Marca / Modelo"},
    {key:"serie",      label:"N° Serie"},
    {key:"asignado",   label:"Asignado A"},
    {key:"fecha",      label:"Fecha Asignación",     type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
  comunicacion:{label:"Medios de Comunicación",   icon:"📻", fields:[
    {key:"id",         label:"ID Dispositivo",       required:true},
    {key:"tipo",       label:"Tipo",                 required:true},
    {key:"modelo",     label:"Marca / Modelo"},
    {key:"canal",      label:"Frecuencia / Canal"},
    {key:"asignado",   label:"Asignado A"},
    {key:"fecha",      label:"Fecha Entrega",        type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
  reasignacion:{label:"Reasignación de Personal", icon:"👮", fields:[
    {key:"id",         label:"N° Registro",          required:true},
    {key:"nombre",     label:"Nombre Completo",      required:true},
    {key:"rango",      label:"Rango / Cargo"},
    {key:"origen",     label:"Unidad Origen"},
    {key:"destino",    label:"Unidad Destino"},
    {key:"fecha",      label:"Fecha Reasignación",   type:"date"},
    {key:"estatus",    label:"Estatus",              type:"status", required:true},
    {key:"obs",        label:"Observaciones",        wide:true},
  ]},
};

const STATUSES   = ["ENTREGADO","PENDIENTE","EN PROCESO","BAJA/FALLA"];
const STATUS_ICONS = {"ENTREGADO":"✅","PENDIENTE":"⏳","EN PROCESO":"🔄","BAJA/FALLA":"❌"};
const STATUS_CSS   = {"ENTREGADO":"s-ENTREGADO","PENDIENTE":"s-PENDIENTE","EN PROCESO":"s-EN-PROCESO","BAJA/FALLA":"s-BAJA-FALLA"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let DATA = Object.fromEntries(Object.keys(SECTIONS).map(k=>[k,[]]));
let currentPage = "dashboard";
let searchQuery = "";
let filterStatus = "TODOS";
let isSaving = false;

// ── API ───────────────────────────────────────────────────────────────────────
function setSyncing(state) {
  const dot = document.getElementById("syncDot");
  const lbl = document.getElementById("syncLabel");
  if(state==="syncing"){ dot.className="sync-dot syncing"; lbl.textContent="Sincronizando…"; }
  else if(state==="ok"){ dot.className="sync-dot"; lbl.textContent="Conectado"; }
  else { dot.className="sync-dot error"; lbl.textContent="Sin conexión"; }
}

async function apiFetch(sheet) {
  const url = `${API_URL}?sheet=${sheet}&t=${Date.now()}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify(payload),
    headers:{"Content-Type":"application/json"}
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadAllData(silent=false) {
  if(!silent) showLoading("Cargando datos desde Google Sheets…");
  setSyncing("syncing");
  try {
    const results = await Promise.all(
      Object.keys(SECTIONS).map(sec => apiFetch(sec).then(rows=>({sec,rows})))
    );
    results.forEach(({sec,rows})=>{ DATA[sec] = Array.isArray(rows) ? rows : []; });
    setSyncing("ok");
    if(!silent) hideLoading();
    render();
    if(silent) showToast("✅ Datos actualizados","success");
  } catch(e) {
    setSyncing("error");
    if(!silent) hideLoading();
    showToast("❌ Error al conectar con Google Sheets. Verifica la URL del script.","error");
    render();
  }
}

async function updateStatus(sec, idx, newStatus) {
  if(isSaving) return;
  isSaving = true;
  setSyncing("syncing");
  const row = {...DATA[sec][idx], estatus: newStatus};
  DATA[sec][idx].estatus = newStatus; // optimistic
  render();
  try {
    await apiPost({sheet:sec, action:"update", index:idx, row});
    setSyncing("ok");
    showToast(`✅ Estatus → ${newStatus}`,"success");
  } catch(e) {
    DATA[sec][idx].estatus = DATA[sec][idx].estatus; // rollback would need original
    setSyncing("error");
    showToast("❌ Error al guardar. Verifica conexión.","error");
  }
  isSaving = false;
}

async function addRow(sec, row) {
  setSyncing("syncing");
  try {
    await apiPost({sheet:sec, action:"add", row});
    setSyncing("ok");
    await loadAllData(true);
    showToast("✅ Registro guardado en Google Sheets","success");
  } catch(e) {
    setSyncing("error");
    showToast("❌ Error al guardar. Verifica conexión.","error");
  }
}

async function deleteRow(sec, idx) {
  if(!confirm("¿Eliminar este registro?")) return;
  setSyncing("syncing");
  try {
    await apiPost({sheet:sec, action:"delete", index:idx});
    setSyncing("ok");
    await loadAllData(true);
    showToast("🗑️ Registro eliminado","success");
  } catch(e) {
    setSyncing("error");
    showToast("❌ Error al eliminar.","error");
  }
}

// ── LOADING ───────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById("loadingText").textContent = msg||"Cargando…";
  document.getElementById("loadingOverlay").classList.remove("hidden");
}
function hideLoading() {
  document.getElementById("loadingOverlay").classList.add("hidden");
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function getStats(sec) {
  const rows = DATA[sec]||[];
  return {
    total:     rows.length,
    entregado: rows.filter(r=>r.estatus==="ENTREGADO").length,
    pendiente: rows.filter(r=>r.estatus==="PENDIENTE").length,
    enProceso: rows.filter(r=>r.estatus==="EN PROCESO").length,
    baja:      rows.filter(r=>r.estatus==="BAJA/FALLA").length,
  };
}

function formatDate(d) {
  if(!d) return "–";
  if(d.includes("/")) return d;
  try { const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; }
  catch(e){ return d; }
}

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className="toast",2800);
}

function updateNavBadges() {
  Object.keys(SECTIONS).forEach(sec=>{
    const s=getStats(sec);
    const el=document.getElementById(`nb-${sec}`);
    if(!el) return;
    el.textContent=`${s.entregado}/${s.total}`;
    el.className="nav-badge"+(s.pendiente+s.enProceso>0?" pending":"");
  });
}

function setDate() {
  document.getElementById("topDate").textContent =
    new Date().toLocaleDateString("es",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
}
setDate();

// ── NAVIGATE ──────────────────────────────────────────────────────────────────
function navigate(page) {
  currentPage=page; searchQuery=""; filterStatus="TODOS";
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  const a=document.querySelector(`[data-page="${page}"]`);
  if(a) a.classList.add("active");
  render();
}

function render() {
  updateNavBadges();
  const mc=document.getElementById("mainContent");
  mc.innerHTML = currentPage==="dashboard" ? renderDashboard() : renderSection(currentPage);
  if(currentPage!=="dashboard") bindStatusSelects();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  let total=0,entregado=0,pendiente=0,enProceso=0,baja=0;
  Object.keys(SECTIONS).forEach(sec=>{
    const s=getStats(sec);
    total+=s.total;entregado+=s.entregado;pendiente+=s.pendiente;enProceso+=s.enProceso;baja+=s.baja;
  });
  const pct=total>0?Math.round(entregado/total*100):0;

  const rows=Object.entries(SECTIONS).map(([key,sec])=>{
    const s=getStats(key); const p=s.total>0?Math.round(s.entregado/s.total*100):0;
    return `<tr onclick="navigate('${key}')" style="cursor:pointer">
      <td><span class="cat-name">${sec.icon} ${sec.label}</span></td>
      <td style="font-weight:700">${s.total}</td>
      <td style="color:var(--green);font-weight:700">${s.entregado}</td>
      <td style="color:#D97706;font-weight:700">${s.pendiente}</td>
      <td style="color:#0369A1;font-weight:700">${s.enProceso}</td>
      <td style="color:var(--red);font-weight:700">${s.baja}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="mini-bar"><div class="mini-fill" style="width:${p}%"></div></div>
        <span class="pct-label">${p}%</span>
      </div></td>
    </tr>`;
  }).join("");

  return `
    <div class="page-header">
      <h2>📊 Panel Ejecutivo</h2>
      <p>Vista consolidada en tiempo real · Datos desde Google Sheets</p>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card total"><div class="kpi-label">Total Asignado</div><div class="kpi-value">${total}</div><div class="kpi-sub">recursos registrados</div></div>
      <div class="kpi-card green"><div class="kpi-label">✅ Entregado</div><div class="kpi-value">${entregado}</div><div class="kpi-sub">${total>0?Math.round(entregado/total*100):0}% del total</div></div>
      <div class="kpi-card yellow"><div class="kpi-label">⏳ Pendiente</div><div class="kpi-value">${pendiente}</div><div class="kpi-sub">sin asignar</div></div>
      <div class="kpi-card blue"><div class="kpi-label">🔄 En Proceso</div><div class="kpi-value">${enProceso}</div><div class="kpi-sub">en trámite</div></div>
      <div class="kpi-card red"><div class="kpi-label">❌ Baja/Falla</div><div class="kpi-value">${baja}</div><div class="kpi-sub">fuera de servicio</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-header"><span class="progress-title">Avance General de Entrega</span><span class="progress-pct">${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="dash-table-wrap">
      <table class="dash-table">
        <thead><tr><th>CATEGORÍA</th><th>TOTAL</th><th>✅ ENTREGADO</th><th>⏳ PENDIENTE</th><th>🔄 EN PROCESO</th><th>❌ BAJA/FALLA</th><th>AVANCE</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── SECTION ───────────────────────────────────────────────────────────────────
function renderSection(sec) {
  const def=SECTIONS[sec]; const s=getStats(sec);
  const pct=s.total>0?Math.round(s.entregado/s.total*100):0;

  const filtered=DATA[sec].filter(row=>{
    const ms=!searchQuery||Object.values(row).some(v=>String(v).toLowerCase().includes(searchQuery.toLowerCase()));
    const mf=filterStatus==="TODOS"||row.estatus===filterStatus;
    return ms&&mf;
  });

  const ths=def.fields.map(f=>`<th>${f.label.toUpperCase()}</th>`).join("")+"<th>CAMBIAR ESTATUS</th>";

  let tbody="";
  if(!filtered.length){
    tbody=`<tr><td colspan="${def.fields.length+1}"><div class="empty-state"><div class="icon">🔍</div><p>Sin registros que coincidan.</p></div></td></tr>`;
  } else {
    filtered.forEach(row=>{
      const realIdx=DATA[sec].indexOf(row);
      const cells=def.fields.map(f=>{
        if(f.type==="status") return `<td><span class="badge-status ${STATUS_CSS[row.estatus]||''}">${STATUS_ICONS[row.estatus]||""} ${row.estatus||"–"}</span></td>`;
        if(f.type==="date") return `<td>${formatDate(row[f.key])}</td>`;
        return `<td>${row[f.key]||"–"}</td>`;
      }).join("");
      tbody+=`<tr>
        ${cells}
        <td style="display:flex;gap:6px;align-items:center">
          <select class="status-select-inline" data-sec="${sec}" data-idx="${realIdx}">
            ${STATUSES.map(st=>`<option value="${st}" ${row.estatus===st?"selected":""}>${STATUS_ICONS[st]} ${st}</option>`).join("")}
          </select>
          <button class="btn-del" onclick="deleteRow('${sec}',${realIdx})" title="Eliminar">🗑️</button>
        </td>
      </tr>`;
    });
  }

  return `
    <div class="page-header">
      <h2>${def.icon} ${def.label}</h2>
      <p>${s.total} registros · ${s.entregado} entregados · ${s.pendiente} pendientes · ${s.enProceso} en proceso · ${s.baja} baja/falla</p>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
      <div class="kpi-card total"><div class="kpi-label">Total</div><div class="kpi-value">${s.total}</div></div>
      <div class="kpi-card green"><div class="kpi-label">✅ Entregado</div><div class="kpi-value">${s.entregado}</div></div>
      <div class="kpi-card yellow"><div class="kpi-label">⏳ Pendiente</div><div class="kpi-value">${s.pendiente}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">🔄 En Proceso</div><div class="kpi-value">${s.enProceso}</div></div>
      <div class="kpi-card red"><div class="kpi-label">❌ Baja/Falla</div><div class="kpi-value">${s.baja}</div></div>
    </div>
    <div class="progress-wrap" style="margin-bottom:16px">
      <div class="progress-header"><span class="progress-title">Avance — ${def.label}</span><span class="progress-pct">${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="table-toolbar">
      <input class="search-box" type="text" placeholder="🔍 Buscar…" value="${searchQuery}" oninput="searchQuery=this.value;render()"/>
      <select class="filter-select" onchange="filterStatus=this.value;render()">
        <option value="TODOS" ${filterStatus==="TODOS"?"selected":""}>Todos los estatus</option>
        ${STATUSES.map(st=>`<option value="${st}" ${filterStatus===st?"selected":""}>${STATUS_ICONS[st]} ${st}</option>`).join("")}
      </select>
      <button class="btn-add" onclick="openAddModal('${sec}')">＋ Agregar registro</button>
    </div>
    <div class="res-table-wrap">
      <table class="res-table"><thead><tr>${ths}</tr></thead><tbody>${tbody}</tbody></table>
    </div>`;
}

function bindStatusSelects() {
  document.querySelectorAll(".status-select-inline").forEach(sel=>{
    sel.addEventListener("change", function(){
      updateStatus(this.dataset.sec, parseInt(this.dataset.idx), this.value);
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openAddModal(sec) {
  const def=SECTIONS[sec];
  const fields=def.fields.map(f=>{
    const inp = f.type==="status"
      ? `<select id="f_${f.key}" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:Inter,sans-serif;font-size:13px;width:100%">${STATUSES.map(s=>`<option value="${s}">${STATUS_ICONS[s]} ${s}</option>`).join("")}</select>`
      : f.type==="date"
      ? `<input id="f_${f.key}" type="date"/>`
      : `<input id="f_${f.key}" type="text" placeholder="${f.label}"/>`;
    return `<div class="form-group${f.wide?" full":""}"><label>${f.label}${f.required?" *":""}</label>${inp}</div>`;
  }).join("");
  document.getElementById("modalContent").innerHTML=`
    <h3>➕ Agregar — ${def.icon} ${def.label}</h3>
    <div class="form-grid">${fields}</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveNew('${sec}')">Guardar en Sheets</button>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }

async function saveNew(sec) {
  const def=SECTIONS[sec]; const newRow={}; let valid=true;
  def.fields.forEach(f=>{
    const el=document.getElementById(`f_${f.key}`);
    if(el) newRow[f.key]=el.value;
    if(f.required&&(!el||!el.value.trim())){ el&&(el.style.borderColor="var(--red)"); valid=false; }
  });
  if(!valid){ showToast("⚠️ Completa los campos obligatorios (*)","error"); return; }
  const btn=document.getElementById("btnSave");
  btn.disabled=true; btn.textContent="Guardando…";
  closeModal();
  await addRow(sec, newRow);
}

document.getElementById("modalOverlay").addEventListener("click",function(e){ if(e.target===this) closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAllData();
</script>
</body>
</html>
