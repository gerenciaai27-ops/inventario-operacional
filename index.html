<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control de Inventario Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --navy:#0D1B2A;--navy2:#1A2E45;--cyan:#00C2FF;--bg:#EEF2F7;
    --surface:#FFFFFF;--border:#D1DCE8;--text:#1A2E45;--muted:#6B7E94;
    --green:#16A34A;--green-bg:#DCFCE7;--yellow:#B45309;--yellow-bg:#FEF9C3;
    --blue:#0369A1;--blue-bg:#E0F2FE;--red:#B91C1C;--red-bg:#FEE2E2;
    --orange:#C2410C;--orange-bg:#FEF0E7;
    --purple:#7C3AED;--purple-bg:#EDE9FE;
    --radius:10px;--shadow:0 2px 12px rgba(13,27,42,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* LOGIN */
  .login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .login-screen.hidden{display:none;}
  .login-box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.4);}
  .login-logo{text-align:center;margin-bottom:20px;}
  .login-logo .badge{background:var(--cyan);color:var(--navy);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;}
  .login-logo h2{font-size:17px;font-weight:800;color:var(--navy);margin-top:10px;}
  .login-logo p{font-size:12px;color:var(--muted);margin-top:3px;}
  .login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
  .login-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .login-field input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
  .login-field input:focus{border-color:var(--cyan);}
  .btn-login{width:100%;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s;}
  .btn-login:hover{background:var(--cyan);color:var(--navy);}
  .login-error{background:var(--red-bg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;margin-top:10px;display:none;text-align:center;}
  .login-error.show{display:block;}
  .btn-viewer{width:100%;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;}
  .btn-viewer:hover{background:var(--border);}

  /* TOPBAR */
  .topbar{background:var(--navy);color:#fff;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .topbar-brand{display:flex;align-items:center;gap:8px;}
  .topbar-brand .badge{background:var(--cyan);color:var(--navy);font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;}
  .topbar-brand h1{font-size:14px;font-weight:700;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border-radius:20px;padding:4px 10px;font-size:11px;color:#8BA4BF;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;}
  .sync-dot.syncing{background:var(--cyan);animation:blink .6s infinite alternate;}
  .sync-dot.error{background:#F87171;animation:none;}
  @keyframes blink{from{opacity:.3}to{opacity:1}}
  .role-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .role-badge.admin{background:var(--cyan);color:var(--navy);}
  .role-badge.viewer{background:rgba(255,255,255,.12);color:#8BA4BF;}
  .btn-top{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-top:hover{background:rgba(255,255,255,.2);}
  .btn-top.cyan{background:var(--cyan);color:var(--navy);border-color:var(--cyan);}
  .btn-top.red{background:rgba(185,28,28,.3);color:#FCA5A5;border-color:rgba(185,28,28,.4);}

  /* LAYOUT */
  .layout{display:flex;height:calc(100vh - 54px);overflow:hidden;}
  .sidebar{width:52px;background:var(--navy2);overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:2px;transition:width .2s ease;}
  .sidebar.open{width:210px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:500;color:#8BA4BF;border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-item.active{background:rgba(0,194,255,.1);color:var(--cyan);border-left-color:var(--cyan);}
  .nav-icon{font-size:17px;min-width:24px;text-align:center;}
  .nav-label{opacity:0;transition:opacity .15s;}
  .sidebar.open .nav-label{opacity:1;}
  .nav-badge{margin-left:auto;background:rgba(0,194,255,.2);color:var(--cyan);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;display:none;}
  .sidebar.open .nav-badge{display:inline;}
  .nav-badge.warn{background:rgba(234,179,8,.15);color:#EAB308;}
  .sidebar-sep{height:1px;background:rgba(255,255,255,.06);margin:6px 10px;}
  .menu-toggle{display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;color:#4A6280;font-size:18px;}
  .menu-toggle:hover{color:#fff;}
  .main{flex:1;overflow-y:auto;padding:18px;}

  /* LOADING */
  .loading-overlay{position:fixed;inset:0;background:rgba(13,27,42,.75);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .loading-overlay.hidden{display:none;}
  .spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:#fff;font-size:13px;font-weight:600;}

  /* PAGE */
  .page-header{margin-bottom:16px;}
  .page-header h2{font-size:18px;font-weight:800;color:var(--navy);}
  .page-header p{font-size:12px;color:var(--muted);margin-top:2px;}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px;}
  .kpi-card{background:var(--surface);border-radius:var(--radius);padding:13px;box-shadow:var(--shadow);border-top:3px solid var(--border);}
  .kpi-card.total{border-top-color:var(--cyan);}
  .kpi-card.green{border-top-color:var(--green);}
  .kpi-card.yellow{border-top-color:#EAB308;}
  .kpi-card.blue{border-top-color:#0EA5E9;}
  .kpi-card.red{border-top-color:var(--red);}
  .kpi-card.orange{border-top-color:#F97316;}
  .kpi-card.purple{border-top-color:var(--purple);}
  .kpi-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  .kpi-value{font-size:24px;font-weight:800;color:var(--navy);line-height:1;}
  .kpi-card.green .kpi-value{color:var(--green);}
  .kpi-card.yellow .kpi-value{color:#D97706;}
  .kpi-card.blue .kpi-value{color:#0369A1;}
  .kpi-card.red .kpi-value{color:var(--red);}
  .kpi-card.orange .kpi-value{color:#EA580C;}
  .kpi-card.purple .kpi-value{color:var(--purple);}
  .kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;}

  /* PROGRESS */
  .progress-wrap{background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow);}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .progress-title{font-size:12px;font-weight:600;}
  .progress-pct{font-size:17px;font-weight:800;color:var(--green);}
  .progress-track{height:9px;background:var(--bg);border-radius:9px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:9px;transition:width .5s ease;}

  /* DASHBOARD SECTION HEADER */
  .section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;}

  /* DASH TABLE */
  .dash-table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;margin-bottom:20px;}
  .dash-table{width:100%;border-collapse:collapse;min-width:460px;}
  .dash-table th{background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:9px 12px;text-align:left;white-space:nowrap;}
  .dash-table td{font-size:12px;padding:9px 12px;border-bottom:1px solid var(--bg);vertical-align:middle;}
  .dash-table tr:last-child td{border-bottom:none;}
  .dash-table tr:hover td{background:#F5F9FF;cursor:pointer;}
  .cat-name{font-weight:600;display:flex;align-items:center;gap:7px;}
  .mini-bar{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle;}
  .mini-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:6px;}
  .pct-lbl{font-size:11px;font-weight:700;color:var(--green);margin-left:5px;}

  /* SUBCLASS TABLE */
  .sub-table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;margin-bottom:20px;}
  .sub-table{width:100%;border-collapse:collapse;min-width:360px;}
  .sub-table th{background:var(--navy2);color:#fff;font-size:10px;font-weight:600;padding:8px 12px;text-align:left;white-space:nowrap;}
  .sub-table td{font-size:12px;padding:8px 12px;border-bottom:1px solid var(--bg);vertical-align:middle;}
  .sub-table tr:last-child td{border-bottom:none;}
  .sub-table tr:hover td{background:#F5F9FF;}
  .sub-count{font-size:18px;font-weight:800;}

  /* BADGES */
  .badge-s{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .s-E{background:var(--green-bg);color:var(--green);}
  .s-P{background:var(--yellow-bg);color:var(--yellow);}
  .s-N{background:var(--blue-bg);color:var(--blue);}
  .s-B{background:var(--red-bg);color:var(--red);}

  .badge-sub{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;border:1px solid transparent;}
  .sub-1{background:#FEF0E7;color:#C2410C;border-color:#FDBA74;}
  .sub-2{background:#EDE9FE;color:#7C3AED;border-color:#C4B5FD;}
  .sub-3{background:#FEF9C3;color:#92400E;border-color:#FDE68A;}
  .sub-4{background:#E0F2FE;color:#0369A1;border-color:#7DD3FC;}
  .sub-none{background:var(--bg);color:var(--muted);border-color:var(--border);}

  /* TABLE TOOLBAR */
  .table-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .search-box{flex:1;min-width:160px;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;}
  .search-box:focus{border-color:var(--cyan);}
  .filter-sel{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;background:#fff;outline:none;cursor:pointer;}
  .btn-add{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .btn-add:hover{background:var(--cyan);color:var(--navy);}

  /* RES TABLE */
  .res-table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;}
  .res-table{width:100%;border-collapse:collapse;min-width:560px;}
  .res-table th{background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:9px 11px;text-align:left;white-space:nowrap;}
  .res-table td{font-size:12px;padding:8px 11px;border-bottom:1px solid var(--bg);vertical-align:middle;}
  .res-table tr:last-child td{border-bottom:none;}
  .res-table tr:hover td{background:#F5F9FF;}
  .sel-status{border:1px solid var(--border);background:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;padding:4px 6px;border-radius:6px;outline:none;max-width:140px;}
  .btn-action{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all .15s;white-space:nowrap;}
  .btn-action.edit:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue);}
  .btn-action.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red);}
  .actions-cell{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,27,42,.55);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--navy);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-group{display:flex;flex-direction:column;gap:3px;}
  .form-group.full{grid-column:1/-1;}
  .form-group label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .form-group input,.form-group select{padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group select:focus{border-color:var(--cyan);}
  .modal-divider{grid-column:1/-1;height:1px;background:var(--bg);margin:4px 0;}
  .modal-section-label{grid-column:1/-1;font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .btn-cancel{background:var(--bg);color:var(--text);border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;}
  .btn-save{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-save:hover{background:var(--cyan);color:var(--navy);}
  .btn-save:disabled{opacity:.45;cursor:not-allowed;}

  /* TOAST */
  .toast{position:fixed;bottom:20px;right:16px;left:16px;max-width:360px;margin:auto;background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:400;opacity:0;transform:translateY(12px);transition:all .3s ease;pointer-events:none;text-align:center;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.ok{background:#16A34A;}
  .toast.err{background:#B91C1C;}

  .empty-state{text-align:center;padding:40px 16px;color:var(--muted);}
  .empty-state .ei{font-size:36px;margin-bottom:10px;}
  .viewer-notice{background:var(--blue-bg);color:var(--blue);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;margin-bottom:14px;}

  @media(max-width:480px){.form-grid{grid-template-columns:1fr;}}
  @media print{.topbar,.sidebar,.table-toolbar,.btn-action,.modal-overlay,.loading-overlay,.menu-toggle,.login-screen,.viewer-notice{display:none !important;}.layout{display:block;}.main{padding:8px;overflow:visible;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="badge">OPS</span>
      <h2>Inventario Operacional</h2>
      <p>Acceso al sistema de control de recursos</p>
    </div>
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="usuario" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Ingresar como Administrador</button>
    <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
    <button class="btn-viewer" onclick="enterViewer()">👁️ Entrar como Visualizador</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Cargando datos…</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <span class="badge">OPS</span>
    <h1>Inventario Operacional</h1>
  </div>
  <div class="topbar-right">
    <div class="sync-pill"><div class="sync-dot" id="syncDot"></div><span id="syncLbl">Conectado</span></div>
    <span class="role-badge" id="roleBadge">–</span>
    <button class="btn-top" onclick="loadAll(true)">↺</button>
    <button class="btn-top cyan" onclick="window.print()">🖨️</button>
    <button class="btn-top red" onclick="logout()">⏏</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
    <div class="nav-item active" onclick="go('dashboard')" data-p="dashboard"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></div>
    <div class="sidebar-sep"></div>
    <div class="nav-item" onclick="go('motos')" data-p="motos"><span class="nav-icon">🏍️</span><span class="nav-label">Motos</span><span class="nav-badge" id="nb-motos">–</span></div>
    <div class="nav-item" onclick="go('patrullas')" data-p="patrullas"><span class="nav-icon">🚓</span><span class="nav-label">Patrullas</span><span class="nav-badge" id="nb-patrullas">–</span></div>
    <div class="nav-item" onclick="go('gps')" data-p="gps"><span class="nav-icon">📡</span><span class="nav-label">GPS</span><span class="nav-badge" id="nb-gps">–</span></div>
    <div class="nav-item" onclick="go('equipos')" data-p="equipos"><span class="nav-icon">💻</span><span class="nav-label">Equipos</span><span class="nav-badge" id="nb-equipos">–</span></div>
    <div class="nav-item" onclick="go('comunicacion')" data-p="comunicacion"><span class="nav-icon">📻</span><span class="nav-label">Comunicación</span><span class="nav-badge" id="nb-comunicacion">–</span></div>
    <div class="nav-item" onclick="go('reasignacion')" data-p="reasignacion"><span class="nav-icon">👮</span><span class="nav-label">Reasignación</span><span class="nav-badge" id="nb-reasignacion">–</span></div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
const USERS = {gerencia:{pass:"Ops2026",role:"admin"}};
let ROLE = null;

function doLogin(){
  const u=document.getElementById("loginUser").value.trim();
  const p=document.getElementById("loginPass").value;
  const err=document.getElementById("loginError");
  if(USERS[u]&&USERS[u].pass===p){
    ROLE=USERS[u].role;
    sessionStorage.setItem("inv_role","admin");
    startApp();
  } else {
    err.classList.add("show");
    setTimeout(()=>err.classList.remove("show"),3000);
  }
}
function enterViewer(){ ROLE="viewer"; sessionStorage.setItem("inv_role","viewer"); startApp(); }
function logout(){ sessionStorage.clear(); ROLE=null; document.getElementById("loginScreen").classList.remove("hidden"); document.getElementById("loginUser").value=""; document.getElementById("loginPass").value=""; }
function isAdmin(){ return ROLE==="admin"; }
document.getElementById("loginPass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("loginUser").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("loginPass").focus();});

// ── CONFIG ────────────────────────────────────────────────────────────────────
const API="https://script.google.com/macros/s/AKfycbx3R5dioJ8ZgCHz6PxFEO1fP1nUtQWhMHkxLfKqfHAfykRAUf9ITHdGohwyks8L7ATDBA/exec";

// Subclasificaciones globales
const SUBS = [
  {k:"",           lb:"Sin clasificación"},
  {k:"NO_ENTREGA", lb:"Elemento no entrega recurso"},
  {k:"LABORATORIO",lb:"Equipo ingresa a laboratorio"},
  {k:"INACTIVA",   lb:"Unidad inactiva"},
  {k:"RECUPERACION",lb:"En proceso de recuperación"},
];
const SUB_CSS  = {"NO_ENTREGA":"sub-1","LABORATORIO":"sub-2","INACTIVA":"sub-3","RECUPERACION":"sub-4","":"sub-none"};

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function toggleSidebar(){sideOpen=!sideOpen;document.getElementById("sidebar").classList.toggle("open",sideOpen);}

// ── JSONP ─────────────────────────────────────────────────────────────────────
function jsonpFetch(sheet){
  return new Promise((res,rej)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const timer=setTimeout(()=>{delete window[cb];s.remove();rej(new Error("timeout"));},12000);
    window[cb]=data=>{clearTimeout(timer);delete window[cb];s.remove();res(data);};
    s.src=`${API}?sheet=${sheet}&callback=${cb}&t=${Date.now()}`;
    s.onerror=()=>{clearTimeout(timer);delete window[cb];s.remove();rej(new Error("script error"));};
    document.head.appendChild(s);
  });
}
async function apiPost(payload){
  const r=await fetch(API,{method:"POST",body:JSON.stringify(payload)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
function sync(state){
  const d=document.getElementById("syncDot"),l=document.getElementById("syncLbl");
  if(state==="ok"){d.className="sync-dot";l.textContent="Conectado";}
  else if(state==="busy"){d.className="sync-dot syncing";l.textContent="Sincronizando…";}
  else{d.className="sync-dot error";l.textContent="Sin conexión";}
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll(silent=false){
  if(!silent){document.getElementById("loadingText").textContent="Cargando datos…";document.getElementById("loadingOverlay").classList.remove("hidden");}
  sync("busy");
  try{
    const results=await Promise.all(Object.keys(SECS).map(sec=>jsonpFetch(sec).then(rows=>({sec,rows}))));
    results.forEach(({sec,rows})=>{DATA[sec]=Array.isArray(rows)?rows.filter(r=>Object.values(r).some(v=>v&&v!=="")):[]; });
    sync("ok");
    if(!silent) document.getElementById("loadingOverlay").classList.add("hidden");
    render();
    if(silent) toast("✅ Datos actualizados","ok");
  }catch(e){
    sync("error");
    if(!silent) document.getElementById("loadingOverlay").classList.add("hidden");
    toast("❌ Error de conexión con Google Sheets","err");
    render();
  }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function stats(sec){
  const r=DATA[sec]||[];
  const sub={NO_ENTREGA:0,LABORATORIO:0,INACTIVA:0,RECUPERACION:0};
  r.forEach(x=>{ if(x.clasificacion&&sub[x.clasificacion]!==undefined) sub[x.clasificacion]++; });
  return{
    total:r.length,
    e:r.filter(x=>x.estatus==="ENTREGADO").length,
    p:r.filter(x=>x.estatus==="PENDIENTE").length,
    n:r.filter(x=>x.estatus==="EN PROCESO").length,
    b:r.filter(x=>x.estatus==="BAJA/FALLA").length,
    sub
  };
}

function globalSubStats(){
  const sub={NO_ENTREGA:0,LABORATORIO:0,INACTIVA:0,RECUPERACION:0};
  Object.keys(SECS).forEach(sec=>{
    (DATA[sec]||[]).forEach(r=>{
      if(r.clasificacion&&sub[r.clasificacion]!==undefined) sub[r.clasificacion]++;
    });
  });
  return sub;
}

function subLabel(k){ return SUBS.find(s=>s.k===k)?.lb||"–"; }
function fmtDate(d){
  if(!d||d==="–") return "–";
  if(d.includes("/")) return d;
  try{const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`;}catch{return d;}
}
function toast(msg,type=""){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className=`toast show ${type}`;
  setTimeout(()=>t.className="toast",2800);
}
function updateBadges(){
  Object.keys(SECS).forEach(sec=>{
    const s=stats(sec),el=document.getElementById("nb-"+sec);
    if(!el)return;
    el.textContent=`${s.e}/${s.total}`;
    el.className="nav-badge"+(s.p+s.n>0?" warn":"");
  });
}

  const a=document.querySelector(`[data-p="${p}"]`);if(a)a.classList.add("active");
  if(sideOpen){sideOpen=false;document.getElementById("sidebar").classList.remove("open");}
  render();
}

    <div class="kpi-card" style="border-top-color:${sd.col}">

// ── SECTION ───────────────────────────────────────────────────────────────────
function renderSec(sec){
  const def=SECS[sec],s=stats(sec),pct=s.total>0?Math.round(s.e/s.total*100):0;
  const filtered=DATA[sec].filter(row=>{
    const ms=!srch||Object.values(row).some(v=>String(v).toLowerCase().includes(srch.toLowerCase()));
    const mf=filt==="TODOS"||row.estatus===filt;
    const msub=filtSub==="TODOS"||(row.clasificacion||"")=== filtSub;
    return ms&&mf&&msub;
  });

  const adminCols=isAdmin()?"<th>ACCIONES</th>":"";
  const ths=def.fields.map(f=>`<th>${f.lb.toUpperCase()}</th>`).join("")+adminCols;
  const addBtn=isAdmin()?`<button class="btn-add" onclick="openModal('${sec}','add')">＋ Agregar</button>`:"";
  const viewerBar=!isAdmin()?`<div class="viewer-notice">👁️ Modo visualizador — solo lectura</div>`:"";

  const subOpts=SUBS.map(s=>`<option value="${s.k}"${filtSub===s.k?" selected":""}>${s.k?SUB_ICON[s.k]+" ":""} ${s.lb}</option>`).join("");

  let tbody="";
  if(!filtered.length){
    tbody=`<tr><td colspan="${def.fields.length+(isAdmin()?1:0)}"><div class="empty-state"><div class="ei">🔍</div><p>Sin registros.</p></div></td></tr>`;
  } else {
    filtered.forEach(row=>{
      const ri=DATA[sec].indexOf(row);
      const cells=def.fields.map(f=>{
        if(f.dt==="status") return`<td><span class="badge-s ${SCSS[row.estatus]||''}">${SICO[row.estatus]||""} ${row.estatus||"–"}</span></td>`;
        if(f.dt==="sub"){
          const ck=row.clasificacion||"";
          const cl=ck?subLabel(ck):"Sin clasificación";
          return`<td><span class="badge-sub ${SUB_CSS[ck]||'sub-none'}">${ck?SUB_ICON[ck]+" ":""}${cl}</span></td>`;
        }
        if(f.dt==="date") return`<td>${fmtDate(row[f.k])}</td>`;
        return`<td>${row[f.k]||"–"}</td>`;
      }).join("");

      const adminActions=isAdmin()?`<td>
        <div class="actions-cell">
          <select class="sel-status" data-sec="${sec}" data-idx="${ri}">
            ${STS.map(st=>`<option value="${st}"${row.estatus===st?" selected":""}>${SICO[st]} ${st}</option>`).join("")}
          </select>
          <button class="btn-action edit" onclick="openModal('${sec}','edit',${ri})">✏️</button>
          <button class="btn-action del" onclick="delRow('${sec}',${ri})">🗑️</button>
        </div>
      </td>`:"";

      tbody+=`<tr>${cells}${adminActions}</tr>`;
    });
  }

  return`
  ${viewerBar}
  <div class="page-header"><h2>${def.icon} ${def.label}</h2>
  <p>${s.total} registros · ${s.e} entregados · ${s.p} pendientes · ${s.n} en proceso · ${s.b} baja</p></div>
  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(100px,1fr))">
    <div class="kpi-card total"><div class="kpi-label">Total</div><div class="kpi-value">${s.total}</div></div>
    <div class="kpi-card green"><div class="kpi-label">✅ Entregado</div><div class="kpi-value">${s.e}</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">⏳ Pendiente</div><div class="kpi-value">${s.p}</div></div>
    <div class="kpi-card blue"><div class="kpi-label">🔄 En Proceso</div><div class="kpi-value">${s.n}</div></div>
    <div class="kpi-card red"><div class="kpi-label">❌ Baja/Falla</div><div class="kpi-value">${s.b}</div></div>
    <div class="kpi-card orange"><div class="kpi-label">🚫 No entrega</div><div class="kpi-value">${s.sub.NO_ENTREGA}</div></div>
    <div class="kpi-card purple"><div class="kpi-label">🔬 Laboratorio</div><div class="kpi-value">${s.sub.LABORATORIO}</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">💤 Inactiva</div><div class="kpi-value">${s.sub.INACTIVA}</div></div>
    <div class="kpi-card blue"><div class="kpi-label">🔄 Recuperación</div><div class="kpi-value">${s.sub.RECUPERACION}</div></div>
  </div>
  <div class="progress-wrap" style="margin-bottom:14px">
    <div class="progress-header"><span class="progress-title">${def.label}</span><span class="progress-pct">${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="table-toolbar">
    <input class="search-box" type="text" placeholder="🔍 Buscar…" value="${srch}" oninput="srch=this.value;render()"/>
    <select class="filter-sel" onchange="filt=this.value;render()">
      <option value="TODOS"${filt==="TODOS"?" selected":""}>Todos los estatus</option>
      ${STS.map(st=>`<option value="${st}"${filt===st?" selected":""}>${SICO[st]} ${st}</option>`).join("")}
    </select>
    <select class="filter-sel" onchange="filtSub=this.value;render()">
      <option value="TODOS"${filtSub==="TODOS"?" selected":""}>Todas las clasificaciones</option>
      ${subOpts}
    </select>
    ${addBtn}
  </div>
  <div class="res-table-wrap">
    <table class="res-table"><thead><tr>${ths}</tr></thead><tbody>${tbody}</tbody></table>
  </div>`;
}

function bindSelects(){
  document.querySelectorAll(".sel-status").forEach(sel=>{
    sel.addEventListener("change",function(){ updStatus(this.dataset.sec,parseInt(this.dataset.idx),this.value); });
  });
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
async function updStatus(sec,idx,val){
  if(busy||!isAdmin())return; busy=true; sync("busy");
  DATA[sec][idx].estatus=val; render();
  try{
    await apiPost({sheet:sec,action:"update",index:idx,row:DATA[sec][idx]});
    sync("ok"); toast(`✅ Estatus → ${val}`,"ok");
  }catch(e){ sync("error"); toast("❌ Error al guardar","err"); }
  busy=false;
}

async function delRow(sec,idx){
  if(!isAdmin())return;
  if(!confirm("¿Eliminar este registro? Esta acción no se puede deshacer."))return;
  sync("busy");
  try{
    await apiPost({sheet:sec,action:"delete",index:idx});
    sync("ok"); await loadAll(true);
  }catch(e){ sync("error"); toast("❌ Error al eliminar","err"); }
}

async function saveRow(sec,idx,row){
  sync("busy");
  try{
    if(idx===-1){ await apiPost({sheet:sec,action:"add",row}); }
    else { await apiPost({sheet:sec,action:"update",index:idx,row}); }
    sync("ok"); await loadAll(true);
    toast(idx===-1?"✅ Registro agregado":"✅ Registro actualizado","ok");
  }catch(e){ sync("error"); toast("❌ Error al guardar","err"); }
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(sec,mode="add",idx=-1){
  if(!isAdmin())return;
  const def=SECS[sec];
  const existing=mode==="edit"&&idx>=0?DATA[sec][idx]:{};
  const title=mode==="edit"?`✏️ Editar — ${def.icon} ${def.label}`:`➕ Agregar — ${def.icon} ${def.label}`;

  const fields=def.fields.map(f=>{
    const val=existing[f.k]||"";
    let inp;
    if(f.dt==="status"){
      inp=`<select id="f_${f.k}" style="padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-family:Inter,sans-serif;font-size:13px;width:100%">
        ${STS.map(s=>`<option value="${s}"${val===s?" selected":""}>${SICO[s]} ${s}</option>`).join("")}
      </select>`;
    } else if(f.dt==="sub"){
      inp=`<select id="f_${f.k}" style="padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-family:Inter,sans-serif;font-size:13px;width:100%">
        ${SUBS.map(s=>`<option value="${s.k}"${val===s.k?" selected":""}>${s.k?SUB_ICON[s.k]+" ":""}${s.lb}</option>`).join("")}
      </select>`;
    } else if(f.dt==="date"){
      const dval=val&&val.includes("/")?val.split("/").reverse().join("-"):val;
      inp=`<input id="f_${f.k}" type="date" value="${dval}"/>`;
    } else {
      inp=`<input id="f_${f.k}" type="text" placeholder="${f.lb}" value="${String(val).replace(/"/g,'&quot;')}"/>`;
    }
    return`<div class="form-group${f.wide?" full":""}"><label>${f.lb}${f.req?" *":""}</label>${inp}</div>`;
  }).join("");

  document.getElementById("modalBox").innerHTML=`
    <h3>${title}</h3>
    <div class="form-grid">${fields}</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="bsave" onclick="submitModal('${sec}',${idx})">${mode==="edit"?"Guardar cambios":"Guardar en Sheets"}</button>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal(){ document.getElementById("modalOverlay").classList.remove("open"); }

async function submitModal(sec,idx){
  const def=SECS[sec],row={};let ok=true;
  def.fields.forEach(f=>{
    const el=document.getElementById("f_"+f.k);
    if(el) row[f.k]=el.value;
    if(f.req&&(!el||!el.value.trim())){if(el)el.style.borderColor="var(--red)";ok=false;}
  });
  if(!ok){toast("⚠️ Completa los campos obligatorios","err");return;}
  const b=document.getElementById("bsave");b.disabled=true;b.textContent="Guardando…";
  closeModal();
  await saveRow(sec,idx,row);
}

document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal();});

// ── START ──────────────────────────────────────────────────────────────────────
function startApp(){
  document.getElementById("loginScreen").classList.add("hidden");
  const badge=document.getElementById("roleBadge");
  badge.textContent=isAdmin()?"🔑 Admin":"👁️ Viewer";
  badge.className="role-badge "+(isAdmin()?"admin":"viewer");
  loadAll();
}

const savedRole=sessionStorage.getItem("inv_role");
if(savedRole){ ROLE=savedRole; startApp(); }
</script>
</body>
